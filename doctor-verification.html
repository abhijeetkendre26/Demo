<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Verification | Medisync</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; }
.gradient-text {
  background: linear-gradient(90deg, #0284c7, #10b981);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
</style>
</head>

<body class="bg-gradient-to-br from-sky-50 to-emerald-50 min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-lg bg-white p-8 rounded-2xl shadow-xl">

    <!-- TITLE -->
    <div class="text-center mb-6">
        <h1 class="text-3xl font-bold gradient-text">Doctor Verification</h1>
        <p class="text-slate-500 text-sm">Verify your credentials to access the platform</p>
    </div>

    <!-- FORM -->
    <form class="space-y-5">

        <div>
            <label class="text-sm text-slate-600">Medical License Number</label>
            <input type="text" placeholder="Enter license number"
                class="w-full mt-1 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-sky-400">
        </div>

        <div>
            <label class="text-sm text-slate-600">Specialization</label>
            <input type="text" placeholder="e.g. Cardiologist"
                class="w-full mt-1 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-400">
        </div>

        <div>
            <label class="text-sm text-slate-600">Hospital / Clinic Name</label>
            <input type="text" placeholder="Enter hospital name"
                class="w-full mt-1 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-sky-400">
        </div>

        <div>
            <label class="text-sm text-slate-600">Upload ID Proof</label>
            <input type="file"
                class="w-full mt-1 px-4 py-3 rounded-xl border border-slate-200 bg-white">
        </div>

        <!-- 📸 CAMERA SECTION -->
        <div>
            <label class="text-sm text-slate-600">Capture Live Photo</label>

            <video id="video" class="w-full mt-2 rounded-xl border" autoplay></video>

            <button id="captureBtn" type="button"
                onclick="capturePhoto()"
                class="mt-3 w-full bg-sky-500 text-white py-2 rounded-xl hover:bg-sky-600 transition">
                Capture Photo
            </button>

            <canvas id="canvas" class="hidden"></canvas>

            <img id="photo" class="mt-3 rounded-xl border hidden"/>
        </div>

        <button type="submit"
            class="w-full bg-emerald-500 text-white py-3 rounded-xl font-bold hover:bg-emerald-600 transition shadow-lg">
            Submit for Verification
        </button>

    </form>

    <div class="mt-6 text-center text-sm text-slate-500">
        After submission, your account will be reviewed by admin.
    </div>

</div>

<!-- SCRIPT -->
<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const photo = document.getElementById('photo');
const captureBtn = document.getElementById('captureBtn');

let stream;

// Start camera
navigator.mediaDevices.getUserMedia({ video: true })
  .then(s => {
    stream = s;
    video.srcObject = stream;
  })
  .catch(err => {
    alert("Camera access required!");
  });

// One-time capture
function capturePhoto() {

  // Disable button permanently
  captureBtn.disabled = true;
  captureBtn.innerText = "Photo Captured";
  captureBtn.classList.remove("bg-sky-500");
  captureBtn.classList.add("bg-gray-400", "cursor-not-allowed");

  // Capture frame
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const imageData = canvas.toDataURL('image/png');
  photo.src = imageData;
  photo.classList.remove("hidden");

  // Stop camera (IMPORTANT)
  stream.getTracks().forEach(track => track.stop());

  // Hide video
  video.style.display = "none";
}
</script>

</body>
</html>
