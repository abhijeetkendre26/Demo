<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Medisync</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; }
.gradient-text {
  background: linear-gradient(90deg, #0284c7, #10b981);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
</style>
</head>

<body class="bg-slate-50 flex items-center justify-center min-h-screen px-6">

<div class="max-w-6xl w-full grid md:grid-cols-2 bg-white rounded-3xl shadow-xl overflow-hidden">

    <!-- LEFT SIDE -->
    <div class="hidden md:flex flex-col justify-center p-12 bg-gradient-to-br from-sky-100 to-emerald-100">
        <h1 class="text-4xl font-bold mb-4">
            Welcome Back, <span class="gradient-text"> Medisync</span>
        </h1>
        <p class="text-slate-600 text-lg">
            Smart Remote Patient Monitoring System connecting patients and doctors anytime, anywhere.
        </p>
    </div>

    <!-- RIGHT SIDE (LOGIN FORM) -->
    <div class="p-8 md:p-12">

        <!-- LOGO -->
        <div class="flex items-center gap-2 mb-8">
            <img src="https://lh3.googleusercontent.com/d/1KlEQTcweZbiMbQEkMO5CobhKYEVszzdx" class="w-10 h-10">
            <span class="text-2xl font-bold gradient-text">Medisync</span>
        </div>

        <h2 class="text-2xl font-bold mb-6">Log In</h2>

        <!-- FORM -->
        <form class="space-y-5">

            <div>
                <label class="text-sm text-slate-600">Email</label>
                <input type="email" placeholder="Enter your email"
                    class="w-full mt-1 px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-sky-400">
            </div>

            <div>
                <label class="text-sm text-slate-600">Password</label>
                <input type="password" placeholder="Enter your password"
                    class="w-full mt-1 px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-400">
            </div>

            <div class="flex justify-between text-sm">
                <label class="flex items-center gap-2">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="text-sky-600 hover:underline">Forgot Password?</a>
            </div>

            <button type="submit"
                class="w-full bg-emerald-500 text-white py-3 rounded-xl font-bold hover:bg-emerald-600 transition shadow-lg">
                Log In
            </button>

        </form>

        <!-- SIGNUP LINK -->
        <p class="text-sm text-slate-500 mt-6 text-center">
            Don’t have an account?
            <a href="signup.html" class="text-sky-600 font-semibold hover:underline">Sign Up</a>
        </p>

    </div>

</div>

</body>
</html>
