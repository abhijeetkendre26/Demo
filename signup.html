<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | Medisync</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; }
.gradient-text {
  background: linear-gradient(90deg, #0284c7, #10b981);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
</style>
</head>

<body class="bg-slate-50 flex items-center justify-center min-h-screen px-6">

<div class="max-w-6xl w-full grid md:grid-cols-2 bg-white rounded-3xl shadow-xl overflow-hidden">

    <!-- LEFT SIDE -->
    <div class="hidden md:flex flex-col justify-center p-12 bg-gradient-to-br from-emerald-100 to-sky-100">
        <h1 class="text-4xl font-bold mb-4">
            Join <span class="gradient-text">Medisync</span>
        </h1>
        <p class="text-slate-600 text-lg">
            Create your account and experience smart remote healthcare monitoring powered by AI.
        </p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="p-8 md:p-12">

        <!-- LOGO -->
        <div class="flex items-center gap-2 mb-8">
            <img src="https://lh3.googleusercontent.com/d/1KlEQTcweZbiMbQEkMO5CobhKYEVszzdx" class="w-10 h-10">
            <span class="text-2xl font-bold gradient-text">Medisync</span>
        </div>

        <h2 class="text-2xl font-bold mb-6">Create Account</h2>

        <!-- FORM -->
        <form class="space-y-5" onsubmit="handleSignup(event)">

            <div>
                <label class="text-sm text-slate-600">Full Name</label>
                <input type="text" placeholder="Enter your name"
                    class="w-full mt-1 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-400">
            </div>

            <div>
                <label class="text-sm text-slate-600">Email</label>
                <input type="email" placeholder="Enter your email"
                    class="w-full mt-1 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-sky-400">
            </div>

            <div>
                <label class="text-sm text-slate-600">Password</label>
                <input type="password" placeholder="Create a password"
                    class="w-full mt-1 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-400">
            </div>

            <div>
                <label class="text-sm text-slate-600">Confirm Password</label>
                <input type="password" placeholder="Confirm password"
                    class="w-full mt-1 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-sky-400">
            </div>

            <!-- ROLE SELECT -->
            <div>
                <label class="text-sm text-slate-600">Register As</label>
                <select id="role"
                    class="w-full mt-1 px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-400">
                    <option>Patient</option>
                    <option>Doctor</option>
                </select>
            </div>

            <button type="submit"
                class="w-full bg-emerald-500 text-white py-3 rounded-xl font-bold hover:bg-emerald-600 transition shadow-lg">
                Sign Up
            </button>

        </form>

        <!-- LOGIN LINK -->
        <p class="text-sm text-slate-500 mt-6 text-center">
            Already have an account?
            <a href="login.html" class="text-sky-600 font-semibold hover:underline">Sign In</a>
        </p>

    </div>

</div>

<!-- SCRIPT -->
<script>
function handleSignup(e) {
  e.preventDefault();

  const role = document.getElementById("role").value;

  if (role === "Doctor") {
    alert("Redirecting to Doctor Verification...");
    window.location.href = "doctor-verification.html";
  } else {
    alert("Signup successful!");
    window.location.href = "login.html";
  }
}
</script>

</body>
</html>
